<div class="typing-indicator">
  <div class="bubble-avatar">
    <img [src]="contactAvatar || 'assets/default-avatar.svg'" alt="" (error)="_service.errorImage($event)">
  </div>
  <div class="typing-content">
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <span class="typing-text">{{ contactName }} está escribiendo...</span>
  </div>
</div>
