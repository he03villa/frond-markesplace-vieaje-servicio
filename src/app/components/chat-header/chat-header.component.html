<!-- chat-header.component.html -->
<ion-header class="chat-header" [class.collapsed]="isCollapsed">
  <div class="header-glass">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-button (click)="back.emit()" class="btn-back">
          <ion-icon name="chevron-back" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>

      <div class="header-contact" slot="start">
        <div class="contact-avatar">
          <img [src]="contact?.avatar || 'assets/default-avatar.svg'" (error)="_service.errorImage($event)">
          @if (contact?.online) {
            <div class="online-dot"></div>
          }
        </div>
        <div class="contact-info">
          <h3>{{ contact?.name }}</h3>
          <span class="status" [class.typing]="typing">
            {{ typing ? 'Escribiendo...' : (contact?.online ? 'En línea' : 'Últ. vez ' + lastSeen) }}
          </span>
        </div>
      </div>

      <ion-buttons slot="end">
        <ion-button class="btn-icon">
          <ion-icon name="videocam-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button class="btn-icon">
          <ion-icon name="call-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button class="btn-icon" (click)="profile.emit()">
          <ion-icon name="ellipsis-vertical" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </div>
</ion-header>
