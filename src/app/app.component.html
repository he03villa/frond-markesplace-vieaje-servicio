<ion-app class="modern-app">
   <!-- Fondo Dinámico con Mesh Gradient -->
  <div class="ambient-background">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
    <div class="noise-overlay"></div>
  </div>
  <ion-router-outlet></ion-router-outlet>
  <app-menu-sidebar [show]="menuSidebarService.show()" (close)="menuSidebarService.close()"></app-menu-sidebar>
  <app-notifications-sidebar [show]="notificationsSidebarService.show()" (close)="notificationsSidebarService.close()" (viewAll)="onViewAllNotifications()"></app-notifications-sidebar>
</ion-app>
