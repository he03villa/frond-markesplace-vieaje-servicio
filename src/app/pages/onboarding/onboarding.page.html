<!-- onboarding.page.html -->
<ion-content>
  <div class="swiper-container" #swiperContainer>
    <div class="swiper-wrapper">
      <!-- Slide 1 -->
      <div class="swiper-slide">
        <div class="slide-content">
          <img src="assets/onboarding1.svg" alt="Servicios">
          <h2>Encuentra Servicios</h2>
          <p>Publica tus necesidades y recibe ofertas de profesionales</p>
        </div>
      </div>
      
      <!-- Slide 2 -->
      <div class="swiper-slide">
        <div class="slide-content">
          <img src="assets/onboarding2.svg" alt="Viajes">
          <h2>Comparte Viajes</h2>
          <p>Viaja de forma económica compartiendo gastos</p>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="swiper-slide">
        <div class="slide-content">
          <img src="assets/onboarding3.svg" alt="Confianza">
          <h2>Confianza y Seguridad</h2>
          <p>Valoraciones reales y sistema de reputación</p>
        </div>
      </div>
    </div>

    <!-- Paginación -->
    <div class="swiper-pagination"></div>

    <!-- Botones de navegación -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>

  <div class="button-container">
    <ion-button expand="block" (click)="goToLogin()" class="start-button">
      Comenzar
    </ion-button>
  </div>
</ion-content>
