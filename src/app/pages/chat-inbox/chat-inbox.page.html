<app-page-header title="Mensajes" [showBack]="false">
  <ion-buttons slot="end">
    <ion-button class="header-action">
      <ion-icon slot="icon-only" name="search-outline" />
    </ion-button>
    <ion-button class="header-action">
      <ion-icon slot="icon-only" name="create-outline" />
    </ion-button>
  </ion-buttons>
</app-page-header>

<ion-content [fullscreen]="true" class="chat-inbox">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content pullingIcon="arrow-down" pullingText="Tirar para actualizar" refreshingSpinner="crescent" refreshingText="Actualizando..."></ion-refresher-content>
  </ion-refresher>

  @if (isLoading) {
    <div class="skeleton-list">
      @for (i of [1,2,3,4,5]; track $index) {
        <div class="skeleton-conversation">
          <ion-skeleton-text animated class="skeleton-avatar"></ion-skeleton-text>
          <div class="skeleton-body">
            <ion-skeleton-text animated class="skeleton-name"></ion-skeleton-text>
            <ion-skeleton-text animated class="skeleton-message"></ion-skeleton-text>
          </div>
          <ion-skeleton-text animated class="skeleton-time"></ion-skeleton-text>
        </div>
      }
    </div>
  }

  @if (!isLoading && hasError) {
    <div class="state-container">
      <ion-icon name="cloud-offline-outline" class="state-icon"></ion-icon>
      <p>No pudimos cargar tus conversaciones</p>
      <ion-button fill="outline" (click)="getAllConversations()">Reintentar</ion-button>
    </div>
  }

  @if (!isLoading && !hasError) {
  <!-- Lista con animación stagger -->
  <ion-list class="conversations-list" lines="none">
    @for (conv of conversations; track i; let i = $index) {
      <app-conversation-item 
        [conversation]="conv"
        [index]="i"
        (click)="openConversation(conv)">
      </app-conversation-item>
    }
  </ion-list>

  <!-- Empty State -->
  @if (conversations.length === 0 && !hasError) {
    <app-empty-state 
      icon="chatbubbles-outline"
      title="No tienes mensajes"
      subtitle="Cuando recibas un mensaje, aparecerá aquí."
      actionText="Nuevo mensaje"
      (action)="createNewMessage()">
    </app-empty-state>
  }
  }

</ion-content>
