<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280">
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="diamondInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="720" height="1280" fill="#0f172a"/>

  <!-- Icono centrado: escala 0.55 del diseño original 1024x1024 -->
  <g transform="translate(360, 580) scale(0.55) translate(-512, -512)">
    <g filter="url(#shadow)">
      <path d="M512 156 L868 512 L512 868 L156 512 Z"
            fill="none" stroke="url(#diamondGrad)" stroke-width="72" stroke-linejoin="round"/>
      <path d="M512 192 L832 512 L512 832 L192 512 Z"
            fill="url(#diamondInner)"/>
    </g>

    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <path d="M380 370 C560 340, 610 410, 560 460 C490 520, 380 490, 400 570 C420 650, 570 640, 610 590"
            stroke-width="48"/>
      <path d="M460 410 C540 405, 590 455, 520 505 C470 540, 430 520, 440 550"
            stroke-width="40"/>
      <path d="M610 590 C660 585, 690 610, 720 610" stroke-width="14"/>
      <path d="M620 580 C650 570, 680 580, 700 595" stroke-width="6" stroke-dasharray="8,8"/>
      <circle cx="738" cy="610" r="16" fill="#ffffff" stroke="none"/>
      <circle cx="738" cy="610" r="6" fill="#0f172a" stroke="none"/>
    </g>
  </g>
</svg>
